name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, production]

jobs:
  backend-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest

      - name: Python syntax check
        working-directory: backend
        run: |
          python -c "
          import ast, os, sys
          ok = 0
          for root, dirs, files in os.walk('.'):
              for f in files:
                  if f.endswith('.py'):
                      p = os.path.join(root, f)
                      with open(p) as fh:
                          ast.parse(fh.read(), p)
                      ok += 1
          print(f'{ok} Python files — all clean')
          "

      - name: Flask app boots
        working-directory: backend
        run: |
          python -c "
          import sys; sys.path.insert(0, '.')
          from app import app
          rules = [r.rule for r in app.url_map.iter_rules() if r.rule != '/static/<path:filename>']
          critical = ['/healthz', '/api/vulns/scan', '/api/v1/evolution/status']
          missing = [r for r in critical if r not in rules]
          print(f'{len(rules)} routes registered')
          assert not missing, f'Missing critical routes: {missing}'
          print('App boots successfully.')
          "

      - name: Backend pytest
        working-directory: .
        run: |
          python -m pytest -q

  frontend-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install and build
        working-directory: frontend
        run: |
          npm install
          npm run build

  # Validates docker-compose.prod.yml + frontend/nginx.conf (same-origin /api build). Full API image
  # build uses backend/Dockerfile (liboqs compile) and is intentionally not run every PR.
  docker-prod-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compose config (requires .env for env_file)
        run: |
          printf '%s\n' 'QC_API_KEY_PEPPER=ci-not-a-secret' 'QC_AUDIT_HMAC_KEY=ci-not-a-secret' > .env
          docker compose -f docker-compose.prod.yml config >/dev/null
          echo "docker-compose.prod.yml OK"

      - name: Build dashboard Docker image (nginx + Vite, VITE_SAME_ORIGIN_API)
        run: |
          docker build -f frontend/Dockerfile ./frontend \
            --build-arg VITE_SAME_ORIGIN_API=1 \
            --build-arg VITE_API_URL= \
            --build-arg VITE_QC_API_URL= \
            -t qc-dashboard:ci

  argocd-health:
    if: github.event_name == 'pull_request' && github.base_ref == 'production'
    needs: [backend-check, frontend-check, docker-prod-frontend]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Install argocd CLI
        run: |
          curl -sSL -o argocd https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          chmod +x argocd
          sudo mv argocd /usr/local/bin/argocd
          argocd version --client

      - name: Gate merge if production is degraded
        env:
          ARGOCD_SERVER: ${{ secrets.ARGOCD_SERVER }}
          ARGOCD_AUTH_TOKEN: ${{ secrets.ARGOCD_AUTH_TOKEN }}
          ARGOCD_OPTS: ${{ secrets.ARGOCD_OPTS }}
          APP_PRODUCTION: ${{ vars.ARGOCD_APP_PRODUCTION || 'queen-califia-production' }}
        run: |
          set -euo pipefail
          test -n "$ARGOCD_SERVER"
          test -n "$ARGOCD_AUTH_TOKEN"
          OPTS="${ARGOCD_OPTS:-}"
          sudo apt-get update -y >/dev/null
          sudo apt-get install -y jq >/dev/null
          # shellcheck disable=SC2086
          status="$(argocd app get "$APP_PRODUCTION" --server "$ARGOCD_SERVER" --auth-token "$ARGOCD_AUTH_TOKEN" $OPTS -o json \
            | jq -r '.status.health.status + "/" + .status.sync.status')"
          echo "$APP_PRODUCTION => $status"
          test "$status" = "Healthy/Synced"
