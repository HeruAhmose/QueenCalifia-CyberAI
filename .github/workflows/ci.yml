name: ci

on:
  push:
  pull_request:

jobs:
  # ═══════════════════════════════════════════════════════════
  #  BACKEND: lint + verify requirements
  # ═══════════════════════════════════════════════════════════
  backend-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Syntax check (all Python files)
        run: |
          python -c "
          import ast, os, sys
          errors = []
          for root, dirs, files in os.walk('.'):
              for f in files:
                  if f.endswith('.py'):
                      path = os.path.join(root, f)
                      try:
                          with open(path) as fh:
                              ast.parse(fh.read(), path)
                      except SyntaxError as e:
                          errors.append(f'{path}: {e}')
          if errors:
              for e in errors: print(e, file=sys.stderr)
              sys.exit(1)
          print(f'All Python files parse clean.')
          "

      - name: Import chain verification
        run: |
          python -c "
          import sys; sys.path.insert(0, '.')
          from app import create_app
          app = create_app()
          rules = [r.rule for r in app.url_map.iter_rules() if r.rule != '/static/<path:filename>']
          print(f'{len(rules)} routes registered successfully.')
          "

      - name: Verify no secrets in codebase
        run: |
          set -euo pipefail
          # Check for common secret patterns in tracked files
          if git ls-files | xargs grep -lE '(AKIA[0-9A-Z]{16}|sk-[a-zA-Z0-9]{48}|ghp_[a-zA-Z0-9]{36})' 2>/dev/null; then
            echo "::error::Potential secrets found in tracked files!"
            exit 1
          fi
          echo "No secrets detected."

  # ═══════════════════════════════════════════════════════════
  #  FRONTEND: build check
  # ═══════════════════════════════════════════════════════════
  frontend-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install
        run: npm install

      - name: Build
        run: npm run build

  # ═══════════════════════════════════════════════════════════
  #  K8S VALIDATION (preserved from v1 — runs only when
  #  helm/ or k8s/ directories exist and have changes)
  # ═══════════════════════════════════════════════════════════
  k8s-validate:
    needs: backend-check
    runs-on: ubuntu-latest
    if: |
      hashFiles('helm/**') != '' || hashFiles('k8s/**') != ''

    steps:
      - uses: actions/checkout@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.4

      - name: Setup Kustomize
        uses: imranismail/setup-kustomize@v2
        with:
          kustomize-version: v5.4.2

      - name: Install kubeconform
        run: |
          set -euo pipefail
          KUBECONFORM_VERSION="0.6.7"
          curl -fsSL -o /tmp/kubeconform.tar.gz "https://github.com/yannh/kubeconform/releases/download/v${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz"
          tar -C /tmp -xzf /tmp/kubeconform.tar.gz
          sudo mv /tmp/kubeconform /usr/local/bin/kubeconform
          kubeconform -v

      - name: Helm lint + render
        if: hashFiles('helm/**') != ''
        run: |
          set -euo pipefail
          helm lint ./helm/queen-califia -f ./helm/queen-califia/ci-values.yaml
          helm template qc ./helm/queen-califia -f ./helm/queen-califia/ci-values.yaml --namespace queen-califia > /tmp/qc-helm-rendered.yaml
          kubeconform -strict -ignore-missing-schemas -summary /tmp/qc-helm-rendered.yaml

      - name: Kustomize build + validate
        if: hashFiles('k8s/**') != ''
        run: |
          set -euo pipefail
          kustomize build k8s/ > /tmp/qc-kustomize-rendered.yaml
          kubeconform -strict -ignore-missing-schemas -summary /tmp/qc-kustomize-rendered.yaml

  # ═══════════════════════════════════════════════════════════
  #  KIND SMOKE (preserved from v1 — only on PRs to production)
  # ═══════════════════════════════════════════════════════════
  kind-smoke:
    needs: [k8s-validate]
    runs-on: ubuntu-latest
    if: |
      hashFiles('helm/**') != '' && github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.4

      - name: Create kind cluster
        uses: helm/kind-action@v1.10.0
        with:
          cluster_name: qc-ci
          kubectl_version: v1.29.2

      - name: Smoke install
        env:
          QC_K8S_NAMESPACE: queen-califia
          QC_HELM_RELEASE: qc
          QC_API_IMAGE: qc-api:ci
          QC_FRONTEND_IMAGE: qc-frontend:ci
        run: |
          if [ -f scripts/ci/kind_smoke.sh ]; then
            bash scripts/ci/kind_smoke.sh
          else
            echo "kind_smoke.sh not found — skipping"
          fi

  # ═══════════════════════════════════════════════════════════
  #  ARGOCD GATE (preserved from v1 — only PRs to production)
  # ═══════════════════════════════════════════════════════════
  argocd-health:
    if: github.event_name == 'pull_request' && github.base_ref == 'production'
    needs: [kind-smoke]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Install argocd CLI
        run: |
          curl -sSL -o argocd https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          chmod +x argocd
          sudo mv argocd /usr/local/bin/argocd
          argocd version --client

      - name: Gate merge if production is degraded
        env:
          ARGOCD_SERVER: ${{ secrets.ARGOCD_SERVER }}
          ARGOCD_AUTH_TOKEN: ${{ secrets.ARGOCD_AUTH_TOKEN }}
          ARGOCD_OPTS: ${{ secrets.ARGOCD_OPTS }}
          APP_PRODUCTION: ${{ vars.ARGOCD_APP_PRODUCTION || 'queen-califia-production' }}
        run: |
          set -euo pipefail
          test -n "$ARGOCD_SERVER"
          test -n "$ARGOCD_AUTH_TOKEN"
          OPTS="${ARGOCD_OPTS:-}"
          sudo apt-get update -y >/dev/null
          sudo apt-get install -y jq >/dev/null
          status="$(argocd app get "$APP_PRODUCTION" --server "$ARGOCD_SERVER" --auth-token "$ARGOCD_AUTH_TOKEN" $OPTS -o json \
            | jq -r '.status.health.status + "/" + .status.sync.status')"
          echo "$APP_PRODUCTION => $status"
          test "$status" = "Healthy/Synced"
