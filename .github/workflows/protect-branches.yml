name: Protect branches (one click)

# GitHub allows at most 10 workflow_dispatch inputs. Optional lists live in advanced_json.
on:
  workflow_dispatch:
    inputs:
      owner:
        description: "Repo owner/org (blank = auto-detect)"
        required: false
        default: ""
      repo:
        description: "Repo name (blank = auto-detect)"
        required: false
        default: ""
      approvals:
        description: "Required approving reviews"
        required: true
        default: "2"
      enforce_admins:
        description: "Enforce rules for admins"
        required: true
        type: boolean
        default: true
      require_codeowners:
        description: "Require Code Owner reviews"
        required: true
        type: boolean
        default: true
      auto_detect_checks:
        description: "Auto-detect required check contexts from branch HEAD"
        required: true
        type: boolean
        default: true
      use_checks_objects:
        description: "Prefer required_status_checks.checks objects (context + app_id) when possible"
        required: true
        type: boolean
        default: true
      prefer_checks_objects:
        description: "When checks objects exist, keep contexts limited to non-check-run contexts"
        required: true
        type: boolean
        default: true
      dry_run:
        description: "Print payload only (no API call)"
        required: true
        type: boolean
        default: false
      advanced_json:
        description: 'Optional JSON, e.g. {"exclude_app_slugs":["slug"],"allowlist_regex":["^ci"],"denylist_regex":[],"extra_checks_staging":["x"],"extra_checks_production":["y"]} — string values may be comma-separated instead of arrays'
        required: false
        default: "{}"

permissions:
  contents: read

jobs:
  protect:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Verify gh auth
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          set -euo pipefail
          test -n "${GH_TOKEN:-}"
          gh --version
          gh auth status

      - name: Apply branch protection (staging + production)
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          $ErrorActionPreference = "Stop"

          function Get-AdvStringList([psobject]$obj, [string]$prop) {
            $v = $obj.$prop
            if ($null -eq $v -or $v -eq '') { return @() }
            if ($v -is [System.Array]) {
              return @($v | ForEach-Object { "$_".Trim() } | Where-Object { $_ })
            }
            return @("$v".Split(',') | ForEach-Object { $_.Trim() } | Where-Object { $_ })
          }

          $advJson = '${{ inputs.advanced_json }}'.Trim()
          if (-not $advJson) { $advJson = '{}' }
          try {
            $adv = $advJson | ConvertFrom-Json
          } catch {
            Write-Error "advanced_json must be valid JSON: $_"
            exit 1
          }

          $exclude = Get-AdvStringList $adv 'exclude_app_slugs'
          $allow = Get-AdvStringList $adv 'allowlist_regex'
          $deny = Get-AdvStringList $adv 'denylist_regex'
          $extraStaging = Get-AdvStringList $adv 'extra_checks_staging'
          $extraProd = Get-AdvStringList $adv 'extra_checks_production'

          $owner = "${{ inputs.owner }}"
          $repo  = "${{ inputs.repo }}"

          $approvals = [int]"${{ inputs.approvals }}"
          $enforceAdmins = ("${{ inputs.enforce_admins }}" -eq "true")
          $requireCodeOwners = ("${{ inputs.require_codeowners }}" -eq "true")
          $autoDetect = ("${{ inputs.auto_detect_checks }}" -eq "true")
          $dryRun = ("${{ inputs.dry_run }}" -eq "true")

          $useChecksObjects = ("${{ inputs.use_checks_objects }}" -eq "true")
          $preferChecksObjects = ("${{ inputs.prefer_checks_objects }}" -eq "true")

          $args = @()
          if ($owner) { $args += @("-Owner", $owner) }
          if ($repo)  { $args += @("-Repo",  $repo) }
          $args += @("-Approvals", $approvals)
          $args += @("-EnforceAdmins", $enforceAdmins)
          $args += @("-RequireCodeOwnerReviews", $requireCodeOwners)

          $args += @("-UseChecksObjects", $useChecksObjects)
          $args += @("-PreferChecksObjects", $preferChecksObjects)

          if ($autoDetect) { $args += "-AutoDetectStatusChecks" }
          if ($exclude.Count -gt 0) { $args += @("-ExcludeAppSlugs", $exclude) }
          if ($allow.Count -gt 0)   { $args += @("-AllowlistRegex", $allow) }
          if ($deny.Count -gt 0)    { $args += @("-DenylistRegex",  $deny) }
          if ($extraStaging.Count -gt 0) { $args += @("-ExtraStatusChecksStaging", $extraStaging) }
          if ($extraProd.Count -gt 0)    { $args += @("-ExtraStatusChecksProduction", $extraProd) }

          if ($dryRun) { $args += "-DryRun" }

          pwsh -File scripts/github/protect_branches.ps1 @args
