services:
  - type: web
    name: queen-califia-cyberai
    env: python
    rootDir: backend
    disk:
      name: qc-data
      mountPath: /var/data
      sizeGB: 10
    buildCommand: pip install -r requirements.txt
    # Run a single web worker while vuln scan jobs are stored in process memory.
    # If you later move async scan state to Redis/Celery, you can scale workers
    # back out safely without "scan not found" cross-worker polling drift.
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --threads 4 --timeout 120
    healthCheckPath: /healthz
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
      - key: QC_PRODUCTION
        value: "1"
      - key: QC_NAME
        value: Queen Califia
      - key: QC_DB_PATH
        value: /var/data/queen.db
      - key: QC_EVOLUTION_DB
        value: /var/data/qc_evolution.db
      - key: QC_MEMORY_BACKUP_DIR
        value: /var/data/memory-backups
      - key: QC_API_KEYS_FILE
        value: /var/data/keys.json
      - key: QC_AUDIT_LOG_FILE
        value: /var/data/audit.log.jsonl
      - key: QC_CORS_ORIGINS
        value: https://queencalifia-cyberai.web.app,https://queencalifia-cyberai.firebaseapp.com
      - key: QC_API_KEY
        sync: false
      - key: QC_API_KEY_PEPPER
        sync: false
      - key: QC_AUDIT_HMAC_KEY
        sync: false
      # Convenience for the dashboard: allow scan/remediation without requiring
      # a manually provided X-QC-API-Key in the UI.
      - key: QC_NO_AUTH
        value: "1"
      - key: QC_ADMIN_KEY
        sync: false
      - key: QC_MEMORY_EXPORT_TOKEN
        sync: false
      - key: FRED_API_KEY
        sync: false
      - key: NASDAQ_API_KEY
        sync: false
      # Set both provider keys in Render for full market-source coverage.
      # When omitted, the related APIs remain mounted but surface as
      # configured=false in /api/market/sources and the live smoke check can
      # enforce them with --require-fred / --require-nasdaq.
